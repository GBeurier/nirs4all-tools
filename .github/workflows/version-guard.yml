name: version-guard

# Guardrail: the in-repo version must never be ahead of the latest v* git tag.

on:
  push:
    branches: [main, 'rc/**']
  pull_request:
    branches: [main, 'rc/**']

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet packaging
      - name: Manifest version must not be ahead of the latest tag
        shell: python
        run: |
          import ast
          import re
          import subprocess
          import sys
          from pathlib import Path

          from packaging.version import InvalidVersion, Version

          module = ast.parse(Path("src/nirs4all_tools/__init__.py").read_text(encoding="utf-8"))
          manifest_raw = None
          for node in module.body:
              if (
                  isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)
                  and isinstance(node.value, ast.Constant)
                  and isinstance(node.value.value, str)
              ):
                  manifest_raw = node.value.value
                  break
          if manifest_raw is None:
              print("::error::version-guard: could not read src/nirs4all_tools/__init__.py::__version__")
              sys.exit(1)

          tags = subprocess.run(["git", "tag"], capture_output=True, text=True, check=True).stdout.split()
          candidates = []
          for tag in tags:
              if not tag.startswith("v"):
                  continue
              try:
                  candidates.append((Version(tag[1:]), tag))
              except InvalidVersion:
                  continue
          if not candidates:
              print("::notice::version-guard: no v* tags yet; nothing to compare against")
              sys.exit(0)

          latest_version, latest_tag = max(candidates, key=lambda item: item[0])
          manifest = Version(re.sub(r"^[vV]", "", manifest_raw))
          print(f"nirs4all-tools manifest: {manifest}    latest tag = {latest_tag} ({latest_version})")
          if manifest > latest_version:
              print(
                  f"::error::version-guard: manifest version {manifest} is ahead of latest tag {latest_tag}. "
                  f"Tag v{manifest} before merging the bump to main."
              )
              sys.exit(1)
          print("OK: manifest is not ahead of the latest tag.")
