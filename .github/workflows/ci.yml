name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  tools-gate:
    name: nirs4all-tools gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,parquet]"

      - name: Ruff
        run: ruff check .

      - name: Typecheck
        run: mypy

      - name: Tests
        run: pytest
